<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laboratorio CRUD de Usuarios</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Laboratorio CRUD de Usuarios</h1>
    <p>Projeto didatico com HTML, CSS, Docker, Node.js e MySQL.</p>
    <div id="auth-header" class="auth-header" style="display: none; margin-top: 10px;">
        <span id="user-info">admin</span>
        <button id="btn-logout" class="btn-small">Sair</button>
    </div>
  </header>
  
  <main class="layout">
    <!-- Tela de Login Simples -->
    <section id="login-section" class="panel auth-panel">
      <h2>Acesso ao Sistema</h2>
      <form id="login-form">
        <div class="field">
          <label for="login-usuario">Usuário</label>
          <input type="text" id="login-usuario" name="usuario" required />
        </div>
        <div class="field">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" name="senha" required />
        </div>
        <div class="actions">
          <button type="submit">Entrar</button>
        </div>
      </form>
      <p id="login-mensagem" class="mensagem"></p>
    </section>

    <!-- Conteúdo Principal (CRUD) -->
    <div id="main-content" style="display: none; width: 100%; display: flex; gap: 24px; align-items: flex-start;">
        <section class="panel">
          <h2>Cadastro de Jogo</h2>

          <form id="usuario-form">
            <input hidden type="number" id="usuario-id" name="usuario-id" />


            <div class="field">
              <label for="team_A">ID time A</label>
              <input type="number" id="team_A" name="team_A" required />
            </div>

            <div class="field">
              <label for="team_B">ID time B</label>
              <input type="number" id="team_B" name="team_B" required />
            </div>

            <div class="actions">
              <button type="submit">Salvar</button>
              <button type="button" id="cancelar-edicao">Cancelar edicao</button>
            </div>
          </form>

          <p id="mensagem" class="mensagem" aria-live="polite"></p>
        </section>

        <section class="panel">
          <h2>Jogos cadastrados</h2>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Time A</th>
                  <th>Time B</th>
                  <th>Acoes</th>
                </tr>
              </thead>
              <tbody id="usuarios-tabela"></tbody>
            </table>
          </div>
        </section>
    </div>
  </main>

  <footer class="site-footer">
    <small>Disciplina de desenvolvimento web com containers</small>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
