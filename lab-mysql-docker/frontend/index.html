<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1>
                <span style="color: var(--primary);">REF</span>BASKET
            </h1>
            <ul>
                <li class="contorno"><a href="cadastro.html">Cadastro</a></li>
                <li class="contorno"><a href="#">Tempo Real</a></li>
            </ul>
        </nav>
    </header>

    <div style="text-align: center; margin-top: 30px; font-family: 'DM Sans', sans-serif;">
        <div class="logo">
        <svg
            width="60"
            height="60"
            viewBox="0 0 40 40"
            style="margin: auto;">

            <circle
                cx="20"
                cy="20"
                r="18"
                fill="none"
                stroke="white"
                stroke-width="1.5"
            />

            <path
                d="M20 2 Q28 10 28 20 Q28 30 20 38"
                stroke="white"
                stroke-width="1.5"
                fill="none"
            />

            <path
                d="M20 2 Q12 10 12 20 Q12 30 20 38"
                stroke="white"
                stroke-width="1.5"
                fill="none"
            />

            <line
                x1="2"
                y1="20"
                x2="38"
                y2="20"
                stroke="white"
                stroke-width="1.5"
            />
        </svg>
    </div>

    <h1 style="margin-bottom: 10px;">
        <span style="color: var(--primary);">REF</span>BASKET
    </h1>
    <h2 class="escrita">Sistema de arbitragem para basquete</h2>

    <div class="container">
        <a href="cadastro.html">
            <button class="card">
                <div class="icone">
                    <i data-lucide="users"></i>
                </div>
                <div >
                    <h2>CADASTROS</h2>
                    <p>Gerencie jogos, times, jogadores e técnicos. Visualize e edite todos os registros.</p>
                </div>
                <div class="acao">Acessar -></div>
            </button>
        </a>

        <button class="card destaque">
            <div class="icone">
                <i data-lucide="clock"></i>
            </div>
            <div>
                <h2>JOGO EM TEMPO REAL</h2>
                <p>Controle o placar, tempo, faltas e time-outs durante uma partida ao vivo.</p>
            </div>
            <div class="acao"> Acessar -></div>
        </button> 
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
