<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="cadastro.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="inicio">
          <h1><span style="color: var(--primary)">REF</span>BASKET</h1>
          <ul>
            <li><a href="home.html">&lt; Voltar</a></li>
            <li>CADASTROS</li>
          </ul>
        </div>
        <div>
          <ul>
            <li class="contorno ativo">
              <a href="cadastro.html">CADASTROS</a>
            </li>
            <li class="contorno"><a href="#">TEMPO REAL</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main>
      <div class="tabs">
        <a href="cadastro.html"><button class="tab">JOGOS</button></a>
        <button class="tab ativo">TIMES</button>
        <a href="jogadores.html"><button class="tab">JOGADORES</button></a>
      </div>

      <div class="topo-pagina">
        <h1>TIMES</h1>
        <button id="btn-novo-time" class="novo-jogo">+ Novo Time</button>
      </div>

      <div class="busca">
        <i data-lucide="search" class="icone-busca"></i>

        <input type="text" class="campo-busca" placeholder="Buscar times..." />
      </div>

      <div class="tabela-container">
        <table>
          <thead>
            <tr>
              <th>TIME</th>
              <th>ID</th>
              <th></th>
            </tr>
          </thead>

          <tbody id="tabela-times"></tbody>
        </table>
      </div>

      <script src="https://unpkg.com/lucide@latest"></script>
      <script>
        lucide.createIcons();
      </script>
    </main>

    <div id="modal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2>NOVO TIME</h2>
          <button id="btn-fechar" class="fechar">&times;</button>
        </div>

        <div class="modal-body">
          <div class="campo">
            <label>NOME DO TIME</label>
            <input
              type="text"
              id="nome-time"
              placeholder="Ex: Flamengo Basquete"
            />
          </div>
        </div>

        <div class="modal-footer">
          <button id="btn-cancelar" class="btn-cancelar">Cancelar</button>
          <button id="btn-salvar-time" class="btn-salvar">Salvar</button>
        </div>
      </div>
    </div>
    <script src="./times.js"></script>

  </body>
</html>
